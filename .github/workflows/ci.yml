name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    env:
      MINGA_PATH: ../minga
    steps:
      - uses: actions/checkout@v4

      - name: Clone Minga (for Extension behaviour)
        run: |
          git clone --depth 1 https://${{ github.token }}@github.com/jsmestad/minga.git ../minga
          rm -rf ../minga/zig

      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-

      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix credo --strict
      - run: mix compile

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
      MINGA_PATH: ../minga
    steps:
      - uses: actions/checkout@v4

      - name: Clone Minga (for type resolution)
        run: |
          git clone --depth 1 https://${{ github.token }}@github.com/jsmestad/minga.git ../minga
          rm -rf ../minga/zig

      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-dialyzer-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-dialyzer-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-

      - name: Cache PLT
        uses: actions/cache@v4
        with:
          path: _build/dev
          key: plt-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-${{ hashFiles('mix.lock') }}
          restore-keys: plt-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-

      - run: mix deps.get
      - run: mix dialyzer

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      MINGA_PATH: ../minga
    steps:
      - uses: actions/checkout@v4

      - name: Clone Minga (for Extension behaviour)
        run: |
          git clone --depth 1 https://${{ github.token }}@github.com/jsmestad/minga.git ../minga
          rm -rf ../minga/zig

      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-test-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-test-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-

      - run: mix deps.get
      - run: mix test

  docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: pages
      cancel-in-progress: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      MIX_ENV: dev
      MINGA_PATH: ../minga
    steps:
      - uses: actions/checkout@v4

      - name: Clone Minga
        run: |
          git clone --depth 1 https://${{ github.token }}@github.com/jsmestad/minga.git ../minga
          rm -rf ../minga/zig

      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-docs-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-docs-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-

      - run: mix deps.get
      - run: mix docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: doc/
      - id: deployment
        uses: actions/deploy-pages@v4
